<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakerQueue - Host</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="app-page host-page">

<header class="app-header">
    <div>
        <p class="eyebrow">Host dashboard</p>
        <h1>SpeakerQueue</h1>
    </div>

    <div class="header-meta">
        <span id="meeting-name-display">Meeting</span>
    </div>
</header>

<main class="dashboard-grid">
    <section class="panel meeting-panel">
        <div class="panel-header">
            <h2>Meeting</h2>
        </div>

        <dl class="meeting-details">
            <div>
                <dt>Meeting ID</dt>
                <dd id="meeting-id-display"></dd>
            </div>

            <div>
                <dt>Created</dt>
                <dd id="created-at-display"></dd>
            </div>
        </dl>

        <div class="sharing-tools">
            <div class="qr-frame">
                <img id="qr-code" alt="Participant QR code">
            </div>

            <button id="show-qr-button" type="button" class="secondary-button">
                Enlarge QR code
            </button>

            <label for="participant-link">Participant link</label>
            <input id="participant-link" type="text" readonly>

            <div class="button-row">
                <button id="copy-link-button" type="button">
                    Copy link
                </button>

                <a id="join-link" href="#" class="button-link" target="_blank" rel="noopener">
                    Participant view
                </a>
            </div>

            <p id="copy-link-message" class="helper-text"></p>
        </div>

        <button id="end-meeting-button" type="button" class="danger-button">
            End meeting
        </button>
    </section>

    <section class="panel speaker-panel">
        <div class="panel-header">
            <h2>Current speaker</h2>
        </div>

        <p id="current-speaker" class="current-speaker">Host</p>

        <button id="next-speaker-button" type="button">
            Next speaker
        </button>
    </section>

    <section class="panel queue-panel">
        <div class="panel-header">
            <h2>Queue <span id="queue-count" class="panel-count">0 waiting</span></h2>
        </div>

        <ol id="queue-list" class="stack-list"></ol>
    </section>

    <section class="panel participants-panel">
        <div class="panel-header">
            <h2>Participants <span id="participant-count" class="panel-count">0 connected</span></h2>
        </div>

        <ul id="participant-list" class="stack-list"></ul>
    </section>
</main>

<div id="qr-modal" class="modal" hidden>
    <div class="modal-backdrop" id="qr-modal-backdrop"></div>

    <div class="modal-card">
        <button id="close-qr-button" type="button" class="modal-close">
            Close
        </button>

        <img id="qr-code-large" alt="Large participant QR code">
        <p>Scan to join as a participant</p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/host.js"></script>
</body>
</html>
