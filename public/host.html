<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebateQueue - Host</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
<h1>DebateQueue</h1>

<section>
    <h2>Meeting Information</h2>

    <h3 id="meeting-name-display"></h3>
    <p id="created-at-display"></p>

    <p>Meeting ID</p>
    <p><strong id="meeting-id-display"></strong></p>

    <p>Connected participants</p>
    <p id="participant-count">0</p>

    <a id="join-link" href="#">Open Participant View</a>

    <p>Participant link</p>
    <input id="participant-link" type="text" readonly>
    <button id="copy-link-button">Copy Link</button>
    <p id="copy-link-message"></p>

</section>

<section>
    <h2>Current Speaker</h2>
    <p id="current-speaker">Nobody</p>
    <button id="next-speaker-button">Next Speaker</button>
</section>

<section>
    <h2>Queue</h2>
    <ol id="queue-list"></ol>
</section>

<section>
    <h2>Connected Participants</h2>
    <ul id="participant-list"></ul>
</section>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/host.js"></script>
</body>

</html>
