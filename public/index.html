<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakerQueue</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="landing-page">

<main class="landing-shell">
    <section class="landing-card">
        <p class="eyebrow">Meeting moderation</p>

        <div class="landing-title-row">
            <h1>SpeakerQueue</h1>

            <button
                type="button"
                class="help-button"
                data-help-button
                aria-label="What is SpeakerQueue?"
            >
                ?
            </button>
        </div>

        <p class="intro">
            Create a meeting link participants can use to join, identify themselves,
            and request the floor.
        </p>

        <form action="/meetings" method="POST" class="meeting-form">
            <label for="meeting-name">Meeting name</label>

            <input
                id="meeting-name"
                name="meetingName"
                type="text"
                placeholder="Senate Meeting – 25 June"
                required
            >

            <button type="submit">Create meeting</button>
        </form>
    </section>
</main>

<script src="/js/help-modal.js"></script>

</body>
</html>
