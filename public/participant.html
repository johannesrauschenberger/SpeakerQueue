<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebateQueue - Participant</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
<h1>DebateQueue</h1>

<p>Participant View</p>

<section id="join-section">
    <label for="name-input">Your name</label>
    <br>
    <input id="name-input" type="text" placeholder="Enter your name">
    <br><br>
    <button id="join-button" disabled>Join Meeting</button>
</section>

<section id="meeting-section" hidden>
    <p>Joined as: <strong id="participant-name"></strong></p>
    <p id="participant-status">You are connected.</p>
    <button id="raise-hand-button">Raise Hand</button>
</section>

<br>

<a id="host-link" href="#">Go to Host View</a>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/participant.js"></script>
</body>

</html>
