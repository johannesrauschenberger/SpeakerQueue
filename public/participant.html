<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakerQueue - Participant</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
<h1>DebateQueue</h1>

<p>Participant View</p>

<section id="join-section">
    <label for="name-input">Your name</label>
    <br>
    <input id="name-input" type="text" placeholder="Enter your name">
 
    <br><br>
    <label for="role-select">Role</label>
    <br>
    <select id="role-select">
        <option value="Faculty">Faculty</option>
        <option value="Student Representative">Student Representative</option>
        <option value="Non-academic Staff">Non-academic Staff</option>
        <option value="Guest">Guest</option>
        <option value="Other">Other</option>
    </select>

    <br><br>
    <button id="join-button" disabled>Join Meeting</button>
</section>

<section id="meeting-section" hidden>
    <p>Joined as: <strong id="participant-name"></strong></p>
    <p id="participant-status">You are connected.</p>
    <button id="raise-hand-button">Raise Hand</button>
</section>


<br>

<section id="ended-section" hidden>
    <h2>Meeting ended</h2>
    <p>This meeting has ended. Thank you for participating.</p>
</section>

<br>

<a id="host-link" href="#">Go to Host View</a>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/participant.js"></script>
</body>

</html>
