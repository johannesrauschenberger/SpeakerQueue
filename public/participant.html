<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakerQueue - Participant</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="participant-page">

<main class="participant-shell">
    <section id="join-section" class="participant-card">
        <p class="eyebrow">Participant</p>
        <h1>SpeakerQueue</h1>

        <p id="participant-meeting-name" class="participant-meeting-name">
            Join meeting
        </p>

        <div class="participant-form">
            <label for="name-input">Your name</label>
            <input id="name-input" type="text" placeholder="Enter your name">

            <label for="role-select">Role</label>
            <select id="role-select">
                <option value="" disabled selected>Select role</option>
                <option value="Faculty">Faculty</option>
                <option value="Student Representative">Student Representative</option>
                <option value="Non-academic Staff">Non-academic Staff</option>
                <option value="Guest">Guest</option>
                <option value="Other">Other</option>
            </select>

            <button id="join-button" disabled>Join meeting</button>
        </div>
    </section>

    <section id="meeting-section" class="participant-card" hidden>
        <p class="eyebrow">Participant</p>
        <h1 id="active-meeting-name">Meeting</h1>

        <p class="joined-as">
            Joined as <strong id="participant-name"></strong>
        </p>

        <div id="participant-status" class="participant-status status-connected">
            You are connected.
        </div>

        <button id="raise-hand-button" class="raise-hand-button" type="button">
            <i data-lucide="hand"></i>
            <span id="raise-hand-label">
                Raise hand
            </span>
        </button>

        <p id="participant-help-text" class="participant-help-text">
            Raise your hand to join the speaking queue. Lower it if you no longer wish to speak.
        </p>

        <button id="leave-meeting-button" class="danger-button" type="button">
            Leave meeting
        </button>
    </section>

    <section id="ended-section" class="participant-card" hidden>
        <p class="eyebrow">Meeting ended</p>
        <h1>Thank you</h1>
        <p>This meeting has ended.</p>
    </section>
</main>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script src="/js/participant.js"></script>
</body>
</html>
